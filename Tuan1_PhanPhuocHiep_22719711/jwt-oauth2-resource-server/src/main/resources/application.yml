spring:
  application:
    name: jwt-oauth2-resource-server

  datasource:
    url: jdbc:mariadb://localhost:3306/jwtDemoDB?useUnicode=true&characterEncoding=UTF-8
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: 123456789

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080

rsa:
  private-key: classpath:certs/private_key.pem
  public-key: classpath:certs/public_key.pem

jwt:
  access-token-expiration: 1000
  refresh-token-expiration: 604800000
