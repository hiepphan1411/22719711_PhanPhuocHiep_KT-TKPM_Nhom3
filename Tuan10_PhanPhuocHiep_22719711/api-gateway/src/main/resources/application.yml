server:
  port: 8080

spring:
  application:
    name:
      api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users,/api/users/**

        - id: food-service
          uri: lb://food-service
          predicates:
            - Path=/api/foods,/api/foods/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders,/api/orders/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments,/api/payments/**,/api/notifications,/api/notifications/**

eureka:
  client:
    service-url:
#      defaultZone: http://192.168.137.99:8761/eureka
      defaultZone: http://localhost:8761/eureka